<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

<script>
let myLang='', room='room1', msgRef=null, typingRef=null, roomRef=null;
let soundOn = true;         // 提示音預設開啟
let audioCtx = null;        // Web Audio Context（需使用者互動後才能建立）
let isFirstLoad = true;     // 進入聊天室後第一次載入舊訊息不播音

// ── 提示音（用 Web Audio API 產生，不需要外部音檔）──
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playNotify(){
  if(!soundOn) return;
  try{
    initAudio();
    // 播放兩聲短促高音「叮咚」
    const notes = [880, 1100];
    notes.forEach((freq, i)=>{
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = audioCtx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.4, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.start(t);
      osc.stop(t + 0.22);
    });
  } catch(e){}
}
function toggleSound(){
  // 第一次按下時同時初始化 AudioContext（需使用者互動）
  initAudio();
  soundOn = !soundOn;
  const btn = document.getElementById('soundToggle');
  if(soundOn){
    btn.textContent = '🔔 提示音';
    btn.classList.remove('muted');
    showToast('🔔 提示音已開啟');
    playNotify(); // 試播一下
  } else {
    btn.textContent = '🔕 靜音';
    btn.classList.add('muted');
    showToast('🔕 提示音已關閉');
  }
}

// ── API Key 管理 ──
function saveKey(){
  const k = document.getElementById('keyInput').value.trim();
  if(!k){ showToast('請輸入金鑰'); return; }
  if(!k.startsWith('gsk_') && !k.startsWith('sk-ant-')){ showToast('⚠️ 格式錯誤，應以 gsk_ 或 sk-ant- 開頭'); return; }
  localStorage.setItem('anthropic_key', k);  // keep same key name for compatibility
  showToast('✅ 金鑰已儲存！');
  setTimeout(()=> showScreen('pickScreen'), 800);
}

// 頁面載入：已有金鑰直接進選語言，否則進設定
window.addEventListener('DOMContentLoaded', ()=>{
  const k = localStorage.getItem('anthropic_key') || localStorage.getItem('groq_key');
  showScreen(k ? 'pickScreen' : 'keyScreen');
  if(k){ document.getElementById('keyInput').value = k; }
});

// ── 進入聊天室 ──
function enterChat(lang){
  // 初始化 AudioContext（需在使用者點擊後）
  initAudio();

  room   = document.getElementById('roomInput').value.trim() || 'room1';
  myLang = lang;
  const isZh = lang==='zh';

  document.getElementById('chatHeader').className = 'chat-header '+(isZh?'zh-header':'id-header');
  document.getElementById('inputArea').className  = 'input-area '+(isZh?'zh-input-area':'id-input-area');
  document.getElementById('headerFlag').textContent  = isZh?'🇹🇼':'🇮🇩';
  document.getElementById('headerTitle').textContent = isZh?'中文模式':'Mode Indonesia';
  document.getElementById('msgInput').placeholder    = isZh?'輸入中文訊息…':'Ketik pesan Indonesia…';

  showScreen('chatScreen');
  isFirstLoad = true;

  roomRef   = db.ref('翻譯對話/'+room);
  msgRef    = roomRef.child('messages');
  typingRef = roomRef.child('typing/'+lang);

  db.ref('.info/connected').on('value', s=>{
    document.getElementById('statusDot').className='status-dot '+(s.val()?'online':'');
  });

  // 載入現有訊息（不播音）+ 監聽新訊息
  msgRef.on('child_added', snap=>{
    const isNew = !isFirstLoad;
    addBubble(snap.val(), snap.key, isNew);
    document.getElementById('emptyState').style.display='none';
    scrollBottom();
  });

  // 用 once 判斷「舊訊息載完了」後才開始算新訊息
  msgRef.once('value', ()=>{ isFirstLoad = false; });

  // 對方清除時，自己畫面也清空
  msgRef.on('value', snap=>{ if(!snap.exists()) clearLocalMessages(); });

  const other = isZh?'id':'zh';
  roomRef.child('typing/'+other).on('value', s=>{
    const ti=document.getElementById('typingIndicator');
    ti.className='typing-indicator'+(s.val()?' show':'');
    if(s.val()) scrollBottom();
  });

  document.getElementById('msgInput').addEventListener('input', ()=>{
    typingRef.set(document.getElementById('msgInput').value.length>0);
  });
}

function addBubble(d, key, playSound){
  if(document.querySelector('[data-key="'+key+'"]')) return;
  const msgs   = document.getElementById('messages');
  const isSent = (d.from===myLang);
  const row    = document.createElement('div');
  row.className = 'msg-row '+(isSent?'sent':'recv')+(d.from==='id'?' id-msg':'');
  row.dataset.key = key;
  const mainText = isSent ? d.original   : d.translated;
  const subText  = isSent ? d.translated : d.original;
  const time = new Date(d.ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  // 圖片訊息 vs 文字訊息
  if(d.type === 'image'){
    row.innerHTML=`<div class="bubble"><img src="${d.imageData}" alt="圖片" onclick="viewImage(this.src)"></div><div class="msg-time">${time}</div>`;
  } else {
    row.innerHTML=`<div class="bubble"><div class="bubble-main">${esc(mainText)}</div><div class="bubble-trans">${esc(subText)}</div></div><div class="msg-time">${time}</div>`;
  }
  msgs.insertBefore(row, document.getElementById('typingIndicator'));

  // 對方傳來的訊息才播音 + 閃爍
  if(playSound && !isSent){
    playNotify();
    row.classList.add('new-msg');
    // 震動（Android 支援）
    if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
  }
}

async function sendMessage(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text) return;
  const btn=document.getElementById('sendBtn');
  btn.disabled=true;
  input.value=''; input.style.height='';
  typingRef.set(false);

  let translated='';
  try{
    const apiKey = localStorage.getItem('anthropic_key') || '';
    if(apiKey && (apiKey.startsWith('gsk_') || apiKey.startsWith('sk-ant-'))){
      // ── AI 翻譯（自動判斷 Groq 或 Claude）──
      const isZhToId = myLang==='zh';
      const sysPrompt = isZhToId
        ? '你是中文與印尼文的專業口譯員。請將用戶的中文自然流暢地翻譯成印尼文（Bahasa Indonesia）。只輸出翻譯結果，不要任何解釋。'
        : 'Kamu adalah penerjemah profesional Bahasa Indonesia ke Bahasa Mandarin Tradisional (繁體中文). Terjemahkan pesan pengguna secara alami. Hanya keluarkan hasil terjemahan saja.';

      let res, data;
      if(apiKey.startsWith('gsk_')){
        // Groq API
        res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile', max_tokens: 500, temperature: 0.2,
            messages: [{ role: 'system', content: sysPrompt }, { role: 'user', content: text }]
          })
        });
        data = await res.json();
        if(data.error) throw new Error(data.error.message || 'Groq error');
        translated = data.choices?.[0]?.message?.content?.trim() || '';
      } else {
        // Claude API (sk-ant-...)
        res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001', max_tokens: 500,
            system: sysPrompt,
            messages: [{ role: 'user', content: text }]
          })
        });
        data = await res.json();
        if(data.error) throw new Error(data.error.message || 'Claude error');
        translated = data.content?.[0]?.text?.trim() || '';
      }
      if(!translated) throw new Error('empty');
    } else {
      // ── 備用：Google 翻譯 ──
      const sl = myLang==='zh' ? 'zh-TW' : 'id';
      const tl = myLang==='zh' ? 'id'    : 'zh-TW';
      const url = 'https://translate.googleapis.com/translate_a/single?client=gtx'
        + '&sl=' + sl + '&tl=' + tl + '&dt=t&q=' + encodeURIComponent(text);
      const res  = await fetch(url);
      const data = await res.json();
      translated = data[0].map(seg => seg[0]).join('');
      if(!translated) throw new Error();
    }
  } catch(e){
    showToast('⚠️ 翻譯失敗：' + (e.message||'請確認網路與金鑰'));
    btn.disabled=false; return;
  }

  try{
    await msgRef.push({from:myLang, original:text, translated:translated, ts:Date.now()});
  } catch(e){
    showToast('⚠️ 傳送失敗，請確認網路連線');
  }
  btn.disabled=false;
  input.focus();
}

// ── 清除 ──
function askClear(){ document.getElementById('clearOverlay').classList.add('show'); }
function closeClear(){ document.getElementById('clearOverlay').classList.remove('show'); }
async function confirmClear(){
  closeClear();
  try{ await msgRef.remove(); clearLocalMessages(); showToast('✅ 對話已清除'); }
  catch(e){ showToast('⚠️ 清除失敗，請重試'); }
}
function clearLocalMessages(){
  Array.from(document.getElementById('messages').querySelectorAll('.msg-row')).forEach(r=>r.remove());
  document.getElementById('emptyState').style.display='';
}

function exitChat(){
  if(typingRef) typingRef.set(false);
  if(msgRef) msgRef.off();
  db.ref('.info/connected').off();
  clearLocalMessages();
  isFirstLoad = true;
  showScreen('pickScreen');
}

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; setTimeout(()=>t.className='toast',3000); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ── 圖片傳送 ──
async function sendImage(input){
  const file = input.files[0];
  if(!file) return;
  input.value = ''; // 重置以便再次選同一張

  const imgBtn = document.getElementById('imgBtn');
  imgBtn.disabled = true;
  showToast('📤 圖片上傳中…');

  try {
    const base64 = await compressImage(file, 900, 0.78);
    await msgRef.push({ from: myLang, type: 'image', imageData: base64, ts: Date.now() });
  } catch(e) {
    showToast('⚠️ 圖片傳送失敗，請重試');
  }
  imgBtn.disabled = false;
}

function compressImage(file, maxPx, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if(w > maxPx || h > maxPx){
          if(w > h){ h = Math.round(h * maxPx / w); w = maxPx; }
          else     { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function viewImage(src){
  document.getElementById('imgViewerImg').src = src;
  document.getElementById('imgViewer').classList.add('show');
}
function closeViewer(){
  document.getElementById('imgViewer').classList.remove('show');
  document.getElementById('imgViewerImg').src = '';
}

document.getElementById('msgInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
});
