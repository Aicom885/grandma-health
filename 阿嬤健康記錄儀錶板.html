<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏥 阿嬤健康記錄儀錶板</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --mint:#3ecf8e; --blue:#5b9cf6; --amber:#f59e0b;
      --rose:#f43f5e; --purple:#a78bfa;
      --bg:#0d1b2e; --surface:#122240; --surface2:#183060;
      --border:rgba(255,255,255,.09);
      --text:#e8eaf0; --muted:#7a93b4; --radius:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 55% 35% at 15% 5%, rgba(62,207,142,.07) 0%,transparent 55%),
                 radial-gradient(ellipse 45% 40% at 85% 85%,rgba(91,156,246,.06) 0%,transparent 55%);
      pointer-events:none;z-index:0}

    /* Loading */
    #loadingOverlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
      align-items:center;justify-content:center;z-index:9999;gap:20px}
    .pulse-ring{width:60px;height:60px;border-radius:50%;border:3px solid transparent;
      border-top-color:var(--mint);border-right-color:var(--blue);animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-label{color:var(--muted);font-size:.9rem}

    /* Header */
    .header{position:relative;z-index:10;padding:24px 32px 18px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--border);
      background:rgba(13,27,46,.92);backdrop-filter:blur(14px)}
    .header-left{display:flex;align-items:center;gap:16px}
    .header-icon{width:50px;height:50px;border-radius:14px;
      background:linear-gradient(135deg,var(--mint),var(--blue));
      display:flex;align-items:center;justify-content:center;font-size:1.5rem;
      box-shadow:0 0 20px rgba(62,207,142,.3)}
    .header-title{font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
    .header-subtitle{color:var(--muted);font-size:.8rem;margin-top:3px}
    .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
    .last-updated{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}
    .refresh-btn{background:rgba(62,207,142,.15);border:1px solid rgba(62,207,142,.35);
      color:var(--mint);padding:7px 16px;border-radius:20px;cursor:pointer;
      font-size:.82rem;font-family:'Noto Sans TC',sans-serif;transition:all .2s}
    .refresh-btn:hover{background:rgba(62,207,142,.28)}
    .refresh-btn:disabled{opacity:.5;cursor:not-allowed}

    /* Container */
    .container{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:24px 24px 48px}
    .section-label{font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
      color:var(--muted);margin-bottom:14px;margin-top:32px;display:flex;align-items:center;gap:8px}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}

    /* Today */
    .today-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
    .today-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:18px 14px;text-align:center;transition:transform .2s,box-shadow .2s;
      animation:fadeUp .4s ease both}
    .today-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .today-icon{font-size:1.6rem;margin-bottom:8px}
    .today-label{font-size:.72rem;color:var(--muted);margin-bottom:5px}
    .today-value{font-size:1.05rem;font-weight:700}
    .good{color:var(--mint)}.ok{color:var(--amber)}.bad{color:var(--rose)}
    .info{color:var(--blue)}.mono{font-family:'DM Mono',monospace;font-size:.88rem;color:var(--text)}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:20px 18px;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
    .kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;
      border-radius:var(--radius) var(--radius) 0 0}
    .c-mint::after{background:var(--mint)}.c-green::after{background:#22c55e}
    .c-amber::after{background:var(--amber)}.c-blue::after{background:var(--blue)}
    .c-purple::after{background:var(--purple)}
    .kpi-emoji{font-size:1.4rem;margin-bottom:10px}
    .kpi-label{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .kpi-value{font-size:2rem;font-weight:700;line-height:1}
    .kpi-value span{font-size:.9rem;color:var(--muted);font-weight:400}
    .kpi-sub{font-size:.73rem;color:var(--muted);margin-top:4px}

    /* Charts */
    .charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
    .chart-card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:20px;animation:fadeUp .4s ease both}
    .chart-title{font-size:.88rem;font-weight:600;margin-bottom:16px}
    .chart-wrap{position:relative;height:210px}

    /* Table */
    .table-card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:20px;overflow-x:auto;animation:fadeUp .4s ease both}
    table{width:100%;border-collapse:collapse;font-size:.84rem}
    thead th{padding:10px 14px;text-align:left;font-size:.7rem;font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
      border-bottom:1px solid var(--border);white-space:nowrap}
    tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:rgba(255,255,255,.04)}
    td{padding:10px 14px;white-space:nowrap}
    .td-date{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted)}
    .chip{display:inline-flex;align-items:center;padding:2px 9px;
      border-radius:10px;font-size:.73rem;font-weight:600}
    .chip-yes{background:rgba(62,207,142,.18);color:var(--mint)}
    .chip-no{background:rgba(244,63,94,.15);color:var(--rose)}
    .chip-normal{background:rgba(59,130,246,.18);color:#60a5fa}
    .chip-soft{background:rgba(245,158,11,.18);color:var(--amber)}
    .chip-hard{background:rgba(244,63,94,.18);color:var(--rose)}
    .chip-good{background:rgba(62,207,142,.18);color:var(--mint)}
    .chip-ok{background:rgba(245,158,11,.15);color:var(--amber)}
    .chip-bad{background:rgba(244,63,94,.18);color:var(--rose)}

    /* ── 週報卡片 ── */
    .weekly-card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;animation:fadeUp .4s ease both}
    .weekly-header{
      background:linear-gradient(135deg,rgba(139,92,246,.25) 0%,rgba(59,130,246,.2) 100%);
      border-bottom:1px solid var(--border);
      padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .weekly-title-group{display:flex;align-items:center;gap:12px}
    .weekly-icon{font-size:1.6rem}
    .weekly-title{font-size:1.05rem;font-weight:700}
    .weekly-range{font-family:'DM Mono',monospace;font-size:.75rem;color:#a5b4fc;margin-top:3px}
    .weekly-badge{padding:4px 12px;border-radius:12px;font-size:.72rem;font-weight:600;
      background:rgba(139,92,246,.25);border:1px solid rgba(139,92,246,.4);color:#c4b5fd}
    .weekly-body{padding:24px}
    .weekly-loading{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.88rem;padding:8px 0}
    .weekly-loading .mini-spin{width:18px;height:18px;border-radius:50%;border:2px solid transparent;
      border-top-color:var(--purple);animation:spin .7s linear infinite;flex-shrink:0}
    .weekly-content{line-height:1.85;font-size:.9rem;color:var(--text)}
    .weekly-content h4{font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      color:var(--muted);margin:18px 0 6px;display:flex;align-items:center;gap:6px}
    .weekly-content h4:first-child{margin-top:0}
    .weekly-content p{color:#cbd5e1;margin-bottom:4px}
    .weekly-content .highlight{color:var(--mint);font-weight:600}
    .weekly-content .warn{color:var(--amber);font-weight:600}
    .weekly-content .alert{color:var(--rose);font-weight:600}
    .weekly-content .suggest{
      background:rgba(139,92,246,.1);border-left:3px solid var(--purple);
      border-radius:0 8px 8px 0;padding:10px 14px;margin-top:12px;
      font-size:.85rem;color:#c4b5fd;line-height:1.7}
    .weekly-error{color:var(--rose);font-size:.85rem;padding:8px 0}
    .regen-btn{margin-top:16px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.35);
      color:#c4b5fd;padding:8px 18px;border-radius:20px;cursor:pointer;
      font-size:.82rem;font-family:'Noto Sans TC',sans-serif;transition:all .2s}
    .regen-btn:hover{background:rgba(139,92,246,.28)}

    .footer{text-align:center;padding:28px 24px;color:var(--muted);
      font-size:.73rem;letter-spacing:.03em;border-top:1px solid var(--border)}

    @media(max-width:640px){
      .header{padding:18px 16px;flex-direction:column;gap:14px}
      .header-right{flex-direction:row;align-self:stretch;justify-content:space-between}
      .container{padding:18px 12px 40px}
      .charts-grid{grid-template-columns:1fr}
    }
  </style>
</head>

        </tr>
      </thead>
      <tbody id="recordsBody"></tbody>
    </table>
  </div>
</div>

<div class="footer">
  資料來源：Google Sheets「阿嬤健康記錄」&nbsp;·&nbsp; 僅讀取，不寫入

<script>
/* ══════════════════════════════════════════
   設定
══════════════════════════════════════════ */
const SHEET_ID = '1NZKNe8wJvNbKRbf3YwR3wAg3iqFrehzYZYGkXdhUR6A';
// 發佈到網路後的 CSV 網址（無需登入，允許 CORS）
const PUBLISHED_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?output=csv&gid=0`;

/* ══════════════════════════════════════════

══════════════════════════════════════════ */

let charts = {};

/* ══════════════════════════════════════════
   主流程
══════════════════════════════════════════ */
async function loadData() {
  showLoading(true, '嘗試從 Google Sheets 取得最新資料…');
  document.getElementById('refreshBtn').disabled = true;

  let records = null;
  let isLive  = false;

  // 嘗試從「發佈到網路」的 CSV 取得即時資料
  try {
    const res = await fetch(PUBLISHED_CSV, { cache: 'no-store' });
    if (res.ok) {
      const csv = await res.text();
      const parsed = parseCSV(csv);
      if (parsed.length > 0) { records = parsed; isLive = true; }
    }
  } catch (_) { /* 靜默失敗，改用快取 */ }

  // 若即時取資料失敗，使用內嵌快取
  if (!records) {
    records = parseCSV(CACHED_CSV);
  }

  renderDashboard(records, isLive);
  document.getElementById('lastUpdated').textContent =
    (isLive ? '🟢 即時 · ' : '🟡 快取 · ') +
    new Date().toLocaleString('zh-TW', { timeZone:'Asia/Taipei' });

  showLoading(false);
  document.getElementById('refreshBtn').disabled = false;
}

/* ══════════════════════════════════════════
   CSV 解析
══════════════════════════════════════════ */
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];

  const headers = splitLine(lines[0]).map(h => h.replace(/^"|"$/g,'').trim());
  const idx = {
    date:  findCol(headers,['日期']),
    bowel: findCol(headers,['排便']),
    stool: findCol(headers,['大便性狀','性狀']),
    walk:  findCol(headers,['走路']),
    med:   findCol(headers,['用藥']),
    mood:  findCol(headers,['精神']),
    water: findCol(headers,['喝水']),
    note:  findCol(headers,['備註']),
  };

  return lines.slice(1).map(line => {
    const c = splitLine(line).map(v => v.replace(/^"|"$/g,'').trim());
    const raw = c[idx.date] || '';
    if (!/\d{4}/.test(raw)) return null;
    const d = raw.replace(/\//g,'-')
      .replace(/(\d{4})-(\d{1,2})-(\d{1,2}).*/,(_,y,m,dd)=>`${y}-${m.padStart(2,'0')}-${dd.padStart(2,'0')}`);
    const w = (c[idx.water]||'').replace(/[^\d.]/g,'');
    return { date:d, bowel:c[idx.bowel]||'', stool:c[idx.stool]||'',
             walk:c[idx.walk]||'', medication:c[idx.med]||'',
             mood:c[idx.mood]||'', water:w?Number(w):null, note:c[idx.note]||'' };
  }).filter(r => r && /\d{4}-\d{2}-\d{2}/.test(r.date));
}

function findCol(hs, names) {
  for (const n of names) { const i=hs.findIndex(h=>h.includes(n)); if(i>=0) return i; }
  return 0;
}

function splitLine(line) {
  const r=[]; let cur=''; let q=false;
  for (let i=0;i<line.length;i++) {
    const c=line[i];
    if(c==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q; }
    else if(c===','&&!q){ r.push(cur);cur=''; }
    else cur+=c;
  }
  r.push(cur); return r;
}

function renderDashboard(records, isLive) {
  window._allRecords = records;   // 供週報重新產生用
  records.sort((a,b)=>b.date.localeCompare(a.date));
  const ud   = [...new Set(records.map(r=>r.date))];

/* ══════════════════════════════════════════
   週報：計算週期 & 純 JS 自動分析（不需 API）
══════════════════════════════════════════ */
function getWeekRange(referenceDate) {
  const d = new Date(referenceDate + 'T00:00:00');
  const day = d.getDay();
  const diffToMon = day === 0 ? -6 : 1 - day;
  const mon = new Date(d); mon.setDate(d.getDate() + diffToMon);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = dt => dt.toISOString().slice(0,10);
  return { start: fmt(mon), end: fmt(sun) };
}

function generateWeeklyReport(records) {
  const latestDate = records[0]?.date;
  if (!latestDate) return;
  const { start, end } = getWeekRange(latestDate);
  document.getElementById('weeklyRange').textContent = `${start} ～ ${end}`;

  const weekRecs = records.filter(r => r.date >= start && r.date <= end);
  const allDates = [];
  // 產生該週每一天（即使沒記錄也列出）
  for (let d = new Date(start+'T00:00:00'); d <= new Date(end+'T00:00:00'); d.setDate(d.getDate()+1)) {
    allDates.push(d.toISOString().slice(0,10));
  }
  const recDates  = [...new Set(weekRecs.map(r=>r.date))].sort();
  const totalDays = recDates.length; // 有記錄的天數
  if (totalDays === 0) {
    showWeeklyReport(`<p style="color:var(--muted)">本週（${start} ～ ${end}）尚無任何健康記錄。</p>`);
    return;
  }

  const byDate = dt => weekRecs.filter(r => r.date === dt);

  /* ── 各項統計 ── */
  // 排便
  const bowelDays   = recDates.filter(d => byDate(d).some(r => r.bowel === '有')).length;
  const bowelPct    = Math.round(bowelDays / totalDays * 100);
  const stoolAll    = weekRecs.map(r=>r.stool).filter(Boolean);
  const stoolCount  = cnt => stoolAll.filter(s=>s===cnt).length;
  const hardDays    = recDates.filter(d => byDate(d).some(r=>r.stool==='硬')).length;
  const softDays    = recDates.filter(d => byDate(d).some(r=>r.stool==='軟')).length;

  // 喝水
  const waterByDay  = recDates.map(d => byDate(d).reduce((s,r)=>s+(Number(r.water)||0),0));
  const totalWater  = waterByDay.reduce((s,v)=>s+v,0);
  const avgWater    = totalDays > 0 ? Math.round(totalWater / totalDays) : 0;
  const lowWaterDays= waterByDay.filter(v=>v>0&&v<500).length;
  const noWaterDays = waterByDay.filter(v=>v===0).length;

  // 走路
  const walkDays    = recDates.filter(d => byDate(d).some(r=>r.walk==='有')).length;
  const walkPct     = Math.round(walkDays / totalDays * 100);

  // 用藥
  const medDays     = recDates.filter(d => byDate(d).some(r=>r.medication==='有')).length;
  const medPct      = Math.round(medDays / totalDays * 100);

  // 精神
  const goodDays    = recDates.filter(d => byDate(d).some(r=>r.mood==='好')).length;
  const badDays     = recDates.filter(d => byDate(d).some(r=>r.mood==='不好')).length;
  const okDays      = recDates.filter(d =>
    byDate(d).some(r=>r.mood==='普通') && !byDate(d).some(r=>r.mood==='好')).length;

  // 備註彙整
  const allNotes    = weekRecs.map(r=>r.note).filter(Boolean);

  /* ── 評語輔助 ── */
  const tag = (text, cls) => `<span class="${cls}">${text}</span>`;
  const good  = t => tag(t, 'highlight');
  const warn  = t => tag(t, 'warn');
  const alert = t => tag(t, 'alert');
  const pctTag = (pct, goodThr=80, warnThr=50) =>
    pct >= goodThr ? good(pct+'%') : pct >= warnThr ? warn(pct+'%') : alert(pct+'%');

  /* ── 各段分析 ── */
  // 排便
  let bowelText = `本週有記錄的 ${totalDays} 天中，${good(bowelDays+'天')} 有排便，達成率 ${pctTag(bowelPct)}。`;
  if (stoolAll.length > 0) {
    const types = [];
    if (stoolCount('正常') > 0) types.push(good('正常 '+stoolCount('正常')+'次'));
    if (stoolCount('軟') > 0)   types.push(warn('軟便 '+stoolCount('軟')+'次'));
    if (stoolCount('硬') > 0)   types.push(alert('硬便 '+stoolCount('硬')+'次'));
    bowelText += `性狀方面：${types.join('、')}。`;
  }
  if (hardDays >= 2) bowelText += `本週出現 ${alert(hardDays+'天')} 硬便，建議增加水分及蔬果攝取。`;
  if (bowelPct < 60) bowelText += `排便天數偏低，請留意是否有便秘情形。`;

  // 喝水
  let waterText = '';
  if (noWaterDays === totalDays) {
    waterText = `本週 ${alert('所有天數')} 均未記錄喝水量，請確認是否有記錄到資料。`;
  } else {
    waterText = `本週日均喝水量約 ${avgWater >= 500 ? good(avgWater+'ml') : avgWater >= 300 ? warn(avgWater+'ml') : alert(avgWater+'ml')}。`;
    if (noWaterDays > 0) waterText += `有 ${warn(noWaterDays+'天')} 未記錄水量。`;
    if (lowWaterDays > 0) waterText += `有 ${warn(lowWaterDays+'天')} 喝水不足 500ml，`;
    if (avgWater < 500) waterText += `整體水分補充${alert('明顯不足')}，建議每日目標至少 800～1000ml。`;
    else if (avgWater < 800) waterText += `水分補充${warn('尚可')}，仍有提升空間。`;
    else waterText += `水分補充${good('表現良好')}，請繼續保持！`;
  }

  // 走路
  let walkText = `本週 ${totalDays} 天中有 ${walkPct>=80?good(walkDays+'天'):walkPct>=50?warn(walkDays+'天'):alert(walkDays+'天')} 有走路活動，達成率 ${pctTag(walkPct)}。`;
  if (walkPct === 100) walkText += `每天都有活動，${good('非常棒')}！`;
  else if (walkPct >= 80) walkText += `活動量${good('相當不錯')}，繼續維持。`;
  else if (walkPct >= 50) walkText += `活動量${warn('普通')}，建議天氣好時多在室內或室外走走。`;
  else walkText += `活動量${alert('偏低')}，可以試著在家中短距離走動，有助於腸胃蠕動。`;

  // 用藥
  let medText = `本週用藥達成率 ${pctTag(medPct)}（${medPct>=80?good(medDays+'天'):medPct>=50?warn(medDays+'天'):alert(medDays+'天')}／${totalDays}天）。`;
  if (medPct < 80) medText += `有 ${alert(totalDays-medDays+'天')} 未記錄用藥，請確認是否按時服藥。`;
  else medText += `用藥情況${good('良好')}，請繼續按時服用。`;

  // 精神
  let moodText = '';
  if (goodDays + okDays + badDays === 0) {
    moodText = `本週${warn('未記錄')}精神狀態，建議每天記錄以便追蹤。`;
  } else {
    const parts = [];
    if (goodDays > 0)  parts.push(good('精神好 '+goodDays+'天'));
    if (okDays  > 0)  parts.push(warn('普通 '+okDays+'天'));
    if (badDays > 0)  parts.push(alert('精神不好 '+badDays+'天'));
    moodText = `本週精神狀態：${parts.join('、')}。`;
    if (badDays >= 2)  moodText += `精神不佳天數${alert('較多')}，請多關心情緒與休息品質。`;
    else if (goodDays >= totalDays * 0.6) moodText += `整體精神狀態${good('令人放心')}！`;
  }

  // 備註摘要
  const notesSection = allNotes.length > 0
    ? `<h4>📝 本週備註</h4><p>${allNotes.map(n=>`・${n}`).join('<br>')}</p>`
    : '';

  // ── 詳細建議（依各項指標產出具體建議）──
  const suggests = [];

  // 排便相關
  if (bowelPct === 0) {
    suggests.push(`<strong>排便</strong>：本週完全無排便記錄，請密切觀察是否有腹脹、腹痛或不適感，若超過 3 天未排便建議諮詢醫師。`);
  } else if (bowelPct < 50) {
    suggests.push(`<strong>排便</strong>：本週排便頻率偏低（${bowelDays}/${totalDays} 天），可試著每天早餐後讓阿嬤坐馬桶約 10 分鐘，利用胃結腸反射促進排便。`);
  } else if (hardDays >= 2) {
    suggests.push(`<strong>硬便改善</strong>：本週出現 ${hardDays} 天硬便，建議每日增加深色蔬菜（如菠菜、地瓜葉）及水果（如香蕉、火龍果）攝取，並確保喝水量達 800ml 以上。`);
  } else if (softDays >= 3) {
    suggests.push(`<strong>軟便留意</strong>：本週軟便天數較多，注意飲食是否有油膩或刺激性食物，若伴隨腹痛請就醫。`);
  }

  // 喝水相關
  if (noWaterDays >= Math.ceil(totalDays * 0.5)) {
    suggests.push(`<strong>水分補充</strong>：本週超過一半天數未記錄喝水，老年人口渴感較遲鈍，建議定時給水而非等到口渴，早中晚飯前各一杯（約 200ml）為基本目標。`);
  } else if (avgWater < 400) {
    suggests.push(`<strong>水分嚴重不足</strong>：日均僅 ${avgWater}ml，遠低於老年人建議的 1000～1500ml。長期水分不足易導致便秘、尿道感染及腎功能下降，請積極補充。`);
  } else if (avgWater < 700) {
    suggests.push(`<strong>水分仍需加強</strong>：日均 ${avgWater}ml，建議目標提升至 800ml 以上。可準備固定容量的水壺，方便追蹤每日飲水量。`);
  }

  // 走路相關
  if (walkPct < 40) {
    suggests.push(`<strong>活動量嚴重不足</strong>：本週僅 ${walkDays} 天有走路。長期臥床或久坐會加速肌肉流失並影響腸胃蠕動，建議每天至少扶著助行器在室內走 2～3 趟，每趟 5 分鐘即可。`);
  } else if (walkPct < 70) {
    suggests.push(`<strong>活動量可再提升</strong>：建議天氣好時帶阿嬤到戶外曬太陽走走，日照有助維生素 D 合成與鈣質吸收，對骨骼與情緒都有益。`);
  } else if (walkPct === 100) {
    suggests.push(`<strong>活動表現優秀</strong>：每天都有走路，非常值得鼓勵！可視體力逐漸延長走路時間或加入簡單的手部伸展操。`);
  }

  // 用藥相關
  if (medPct < 60) {
    suggests.push(`<strong>用藥達成率偏低</strong>：本週有 ${totalDays - medDays} 天未記錄服藥，建議將藥盒放在餐桌顯眼處，或使用分藥盒按週分裝，方便確認是否服用。`);
  } else if (medPct < 85) {
    suggests.push(`<strong>用藥</strong>：仍有少數天未完整記錄，可在藥盒旁放一張記錄貼，服藥後立即打勾，減少遺漏。`);
  }

  // 精神相關
  if (badDays >= 3) {
    suggests.push(`<strong>情緒關懷</strong>：本週有 ${badDays} 天精神狀態不佳，老年人情緒低落有時與疼痛、睡眠品質或孤獨感有關，建議多陪伴聊天，了解是否有身體不適未說出口。`);
  } else if (badDays >= 1 && allNotes.some(n => /痛|不舒服|難受/.test(n))) {
    suggests.push(`<strong>身心連動</strong>：備註中有提到身體不適，這可能影響精神狀態，建議追蹤不適症狀是否持續，必要時安排就診。`);
  }

  // 整體良好
  if (suggests.length === 0) {
    suggests.push(`本週各項指標整體${good('表現良好')}！排便規律、水分充足、活動達標，請繼續維持這樣的生活節奏，並保持每天的健康記錄習慣。`);
  }

  const html = `
    <h4>💩 排便狀況</h4><p>${bowelText}</p>
    <h4>💧 水分補充</h4><p>${waterText}</p>
    <h4>🚶 活動與運動</h4><p>${walkText}</p>
    <h4>💊 用藥情形</h4><p>${medText}</p>
    <h4>😊 精神與情緒</h4><p>${moodText}</p>
    ${notesSection}
    <div class="suggest">💡 本週照護建議<br><br>${suggests.map((s,i)=>`<span style="opacity:.6">${i+1}.</span> ${s}`).join('<br><br>')}</div>
  `;
  showWeeklyReport(html);
}

function showWeeklyReport(html) {
  document.getElementById('weeklyLoading').style.display = 'none';
  document.getElementById('weeklyError').style.display   = 'none';
  const el = document.getElementById('weeklyContent');
  el.innerHTML = html; el.style.display = 'block';
  document.getElementById('weeklyBadge').textContent     = '✅ 本週已產出';
  document.getElementById('weeklyBadge').style.background   = 'rgba(62,207,142,.2)';
  document.getElementById('weeklyBadge').style.borderColor  = 'rgba(62,207,142,.4)';
  document.getElementById('weeklyBadge').style.color        = '#3ecf8e';
}

function showWeeklyError(msg) {
  document.getElementById('weeklyLoading').style.display = 'none';
  const el = document.getElementById('weeklyError');
  el.innerHTML = msg; el.style.display = 'block';
}

function renderToday(date, recs) {
  const w    = recs.reduce((s,r)=>s+(Number(r.water)||0),0);
  const bw   = recs.some(r=>r.bowel==='有');
  const wk   = recs.some(r=>r.walk==='有');
  const md   = recs.some(r=>r.medication==='有');
  const mood = ['好','普通','不好'].find(m=>recs.some(r=>r.mood===m))||'-';
  const mE   = {'好':'😊','普通':'😐','不好':'😞'};
  const mC   = {'好':'good','普通':'ok','不好':'bad'};
  document.getElementById('todayGrid').innerHTML = [
    ['📅','最新日期',`<span class="mono">${date}</span>`],
    ['💩','排便',    `<span class="${bw?'good':'bad'}">${bw?'✓ 有':'✗ 無'}</span>`],
    ['🚶','走路',    `<span class="${wk?'good':'bad'}">${wk?'✓ 有':'✗ 無'}</span>`],
    ['💊','用藥',    `<span class="${md?'good':'ok'}">${md?'✓ 有':'✗ 無'}</span>`],
    [mE[mood]||'❓','精神',`<span class="${mC[mood]||''}">${mood}</span>`],
    ['💧','喝水量',  `<span class="info">${w>0?w+' ml':'－'}</span>`],
  ].map((([icon,label,val],i)=>`
    <div class="today-card" style="animation-delay:${i*.05}s">
      <div class="today-icon">${icon}</div>
      <div class="today-label">${label}</div>
      <div class="today-value">${val}</div>
    </div>`)).join('');
}

function renderKPI(records, l14) {
  const r14 = records.filter(r=>l14.includes(r.date));
  const n   = l14.length;
  const by  = d=>r14.filter(r=>r.date===d);
  const pct = v=>n>0?Math.round(v/n*100):0;
  const bD  = l14.filter(d=>by(d).some(r=>r.bowel==='有')).length;
  const wD  = l14.filter(d=>by(d).some(r=>r.walk==='有')).length;
  const mD  = l14.filter(d=>by(d).some(r=>r.medication==='有')).length;
  const gD  = l14.filter(d=>by(d).some(r=>r.mood==='好')).length;
  const wv  = l14.map(d=>by(d).reduce((s,r)=>s+(Number(r.water)||0),0)).filter(v=>v>0);
  const aw  = wv.length?Math.round(wv.reduce((s,v)=>s+v,0)/wv.length):0;
  document.getElementById('kpiGrid').innerHTML = [
    ['c-mint','💩','排便天數',bD,n,'達成率 '+pct(bD)+'%'],
    ['c-green','🚶','走路天數',wD,n,'達成率 '+pct(wD)+'%'],
    ['c-amber','💊','用藥天數',mD,n,'達成率 '+pct(mD)+'%'],
    ['c-blue','💧','日均喝水',aw,'ml','近 '+n+' 天平均'],
    ['c-purple','😊','精神好天數',gD,n,'佔比 '+pct(gD)+'%'],
  ].map(([cls,e,l,v,u,s],i)=>`
    <div class="kpi-card ${cls}" style="animation-delay:${i*.06}s">
      <div class="kpi-emoji">${e}</div>
      <div class="kpi-label">${l}</div>
      <div class="kpi-value">${v}<span>／${u}</span></div>
      <div class="kpi-sub">${s}</div>
    </div>`).join('');
}

function renderCharts(records, l14) {
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  const lbs = l14.map(d=>d.slice(5));
  const by  = d=>records.filter(r=>r.date===d);
  const go  = (extra={})=>({responsive:true,maintainAspectRatio:false,...extra});
  const gx  = {grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#7b83a0'}};

  const wd = l14.map(d=>by(d).reduce((s,r)=>s+(Number(r.water)||0),0));
  charts.water=new Chart(document.getElementById('waterChart'),{type:'bar',
    data:{labels:lbs,datasets:[{data:wd,
      backgroundColor:wd.map(v=>v>=500?'rgba(59,130,246,.8)':v>=300?'rgba(59,130,246,.45)':'rgba(244,63,94,.4)'),
      borderRadius:5,borderSkipped:false}]},
    options:go({plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} ml`}}},
      scales:{y:{beginAtZero:true,...gx},x:{grid:{display:false},ticks:{color:'#7b83a0',font:{size:11}}}}})
  });

  const ms={'好':3,'普通':2,'不好':1};
  const md=l14.map(d=>{const m=['好','普通','不好'].find(x=>by(d).some(r=>r.mood===x));return m?ms[m]:null;});
  charts.mood=new Chart(document.getElementById('moodChart'),{type:'line',
    data:{labels:lbs,datasets:[{data:md,borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,.12)',
      borderWidth:2.5,fill:true,tension:.35,spanGaps:true,
      pointBackgroundColor:md.map(v=>v===3?'#3ecf8e':v===2?'#f59e0b':'#f43f5e'),
      pointRadius:6,pointHoverRadius:8}]},
    options:go({plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>['','不好','普通','好'][c.raw||0]||'-'}}},
      scales:{y:{min:.5,max:3.5,ticks:{stepSize:1,color:'#7b83a0',
        callback:v=>(['','不好','普通','好'][v]||'')},grid:{color:'rgba(255,255,255,.05)'}},
        x:{grid:{display:false},ticks:{color:'#7b83a0',font:{size:11}}}}})
  });

  charts.walkMed=new Chart(document.getElementById('walkMedChart'),{type:'bar',
    data:{labels:lbs,datasets:[
      {label:'走路',data:l14.map(d=>by(d).some(r=>r.walk==='有')?1:0),backgroundColor:'rgba(62,207,142,.75)',borderRadius:4},
      {label:'用藥',data:l14.map(d=>by(d).some(r=>r.medication==='有')?1:0),backgroundColor:'rgba(245,158,11,.75)',borderRadius:4}
    ]},
    options:go({plugins:{legend:{labels:{color:'#7b83a0',font:{size:11}}}},
      scales:{y:{min:0,max:1.3,ticks:{stepSize:1,color:'#7b83a0',callback:v=>v===1?'有':v===0?'無':''},
        grid:{color:'rgba(255,255,255,.05)'}},x:{grid:{display:false},ticks:{color:'#7b83a0',font:{size:11}}}}})
  });

  const sc={'正常':0,'軟':0,'硬':0,'未記錄':0};
  records.forEach(r=>{if(sc[r.stool]!==undefined)sc[r.stool]++;else sc['未記錄']++;});
  charts.stool=new Chart(document.getElementById('stoolChart'),{type:'doughnut',
    data:{labels:Object.keys(sc),datasets:[{data:Object.values(sc),
      backgroundColor:['rgba(59,130,246,.8)','rgba(62,207,142,.8)','rgba(244,63,94,.8)','rgba(100,100,120,.5)'],
      borderColor:'var(--surface)',borderWidth:3}]},
    options:go({plugins:{legend:{position:'right',labels:{color:'#7b83a0',font:{size:12},padding:14}}},cutout:'55%'})
  });
}

function renderTable(records) {
  const chip=(v,map)=>{const c=map[v];return c?`<span class="chip ${c}">${v}</span>`:`<span style="color:var(--muted)">－</span>`;};
  document.getElementById('recordsBody').innerHTML=records.map(r=>`
    <tr>
      <td class="td-date">${r.date}</td>
      <td>${chip(r.bowel,{'有':'chip-yes','沒有':'chip-no'})}</td>
      <td>${chip(r.stool,{'正常':'chip-normal','軟':'chip-soft','硬':'chip-hard'})}</td>
      <td>${chip(r.walk,{'有':'chip-yes','沒有':'chip-no'})}</td>
      <td>${chip(r.medication,{'有':'chip-yes','沒有':'chip-no'})}</td>
      <td>${chip(r.mood,{'好':'chip-good','普通':'chip-ok','不好':'chip-bad'})}</td>
      <td style="font-family:'DM Mono',monospace;font-size:.8rem">${r.water??'－'}</td>
      <td style="color:var(--muted);font-size:.78rem">${r.note||''}</td>
    </tr>`).join('');
}

function showLoading(show, msg) {
  if(msg) document.getElementById('loadingMsg').textContent=msg;
  document.getElementById('loadingOverlay').style.display=show?'flex':'none';
}

loadData();
</script>
</body>
</html>
