function buildFileUrl(folder, fileName) {
  // 將反斜線轉為正斜線以組成 file:// URL
  const path = BASE_PATH + folder + '\\' + fileName;
  const encoded = path.split('').map(c => {
    // 保留常見安全字元，其餘用 encodeURIComponent
    if (/[a-zA-Z0-9\-_.~\/:\\]/.test(c)) return c;
    return encodeURIComponent(c);
  }).join('');
  return 'file:///' + encoded.replace(/\\/g, '/');
}

let expandedFolders = new Set();

function init() {
  document.getElementById('totalFolders').textContent = DATA.length;
  const total = DATA.reduce((s,d) => s + d.files.length, 0);
  document.getElementById('totalFiles').textContent = total.toLocaleString();
  
  // Build folder filter
  const sel = document.getElementById('folderFilter');
  DATA.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.folder;
    opt.textContent = d.folder + ' (' + d.files.length + ')';
    sel.appendChild(opt);
  });
  
  render();
  
  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('folderFilter').addEventListener('change', render);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('folderFilter').value = '';
  expandedFolders.clear();
  render();
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return escHtml(text);
  return escHtml(text.slice(0, idx)) + 
    '<span class="highlight">' + escHtml(text.slice(idx, idx + query.length)) + '</span>' + 
    escHtml(text.slice(idx + query.length));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getExt(name) {
  const m = name.match(/\.([^.]+)$/);
  return m ? m[1].toLowerCase() : '';
}

function render() {
  const query = document.getElementById('searchInput').value.trim();
  const folderFilter = document.getElementById('folderFilter').value;
  const content = document.getElementById('content');
  
  let totalMatch = 0;
  let html = '';
  
  DATA.forEach(d => {
    if (folderFilter && d.folder !== folderFilter) return;
    
    // Filter files
    let files = d.files;
    if (query) {
      files = files.filter(f => 
        f.name.toLowerCase().includes(query.toLowerCase()) ||
        d.folder.toLowerCase().includes(query.toLowerCase())
      );
    }
    
    // If folder name matches query, show all files
    if (query && d.folder.toLowerCase().includes(query.toLowerCase()) && files.length === 0) {
      files = d.files;
    }
    
    if (files.length === 0 && query) return;
    
    totalMatch += files.length;
    
    const isOpen = expandedFolders.has(d.folder) || (query.length > 0);
    const toggleClass = isOpen ? 'open' : '';
    
    html += '<div class="folder-section" id="fs_' + escHtml(d.folder).replace(/[^a-zA-Z0-9]/g,'_') + '">';
    html += '<div class="folder-header" onclick="toggleFolder(\'' + escHtml(d.folder) + '\')">';
    html += '<span class="folder-icon">📁</span>';
    html += '<span class="folder-name">' + highlight(d.folder, query) + '</span>';
    html += '<span class="folder-badge">' + files.length + ' 個圖檔</span>';
    html += '<span class="folder-toggle ' + toggleClass + '">▶</span>';
    html += '</div>';
    
    html += '<table class="files-table ' + toggleClass + '">';
    html += '<thead><tr>';
    html += '<th>檔案名稱</th>';
    html += '<th class="col-size">大小</th>';
    html += '<th class="col-date">修改日期</th>';
    html += '<th>類型</th>';
    html += '<th>開啟</th>';
    html += '</tr></thead><tbody>';
    
    files.forEach(f => {
      const ext = getExt(f.name);
      const extClass = ext === 'pdf' ? 'ext-pdf' : ext === 'dwg' ? 'ext-dwg' : 'ext-other';
      const fileUrl = buildFileUrl(d.folder, f.name);
      html += '<tr>';
      html += '<td><span class="file-name">' + highlight(f.name, query) + '</span></td>';
      html += '<td class="col-size"><span class="file-size">' + escHtml(f.size) + '</span></td>';
      html += '<td class="col-date"><span class="file-date">' + escHtml(f.date) + '</span></td>';
      html += '<td><span class="file-ext ' + extClass + '">' + (ext || '-') + '</span></td>';
      html += '<td><a class="open-btn" href="' + fileUrl + '" title="' + escHtml(f.name) + '">📂 開啟</a></td>';
      html += '</tr>';
    });
    
    html += '</tbody></table></div>';
  });
  
  if (html === '') {
    html = '<div class="empty-state"><div class="icon">🔍</div><p>查無符合「' + escHtml(query) + '」的管線圖檔</p></div>';
  }
  
  document.getElementById('matchCount').textContent = totalMatch.toLocaleString();
  
  const info = query || folderFilter 
    ? '查詢條件：' + (query ? '「<span>' + escHtml(query) + '</span>」' : '') + (folderFilter ? ' 目錄：<span>' + escHtml(folderFilter) + '</span>' : '') + '　共 <span>' + totalMatch + '</span> 個檔案'
    : '共 <span>' + DATA.reduce((s,d)=>s+d.files.length,0) + '</span> 個圖檔，分布於 <span>' + DATA.length + '</span> 個目錄';
  document.getElementById('resultInfo').innerHTML = info;
  
  content.innerHTML = html;
}

function toggleFolder(folder) {
  if (expandedFolders.has(folder)) {
    expandedFolders.delete(folder);
  } else {
    expandedFolders.add(folder);
  }
  render();
}

init();
</script>
</body>
</html>
