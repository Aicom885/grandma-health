<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="團隊打卡">
<title>團隊雲端打卡</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0A1628;--navy2:#112240;--navy3:#1B3461;--navy4:#1E3A5F;
  --accent:#4FC3F7;--gold:#FFD54F;--green:#69F0AE;--red:#FF6B6B;
  --text:#E8F0FE;--muted:#7B9CC4;--border:#1E3A5F;
  --radius:16px;--radius-sm:10px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;padding-bottom:calc(20px + env(safe-area-inset-bottom));}

header{background:var(--navy2);border-bottom:1px solid var(--border);padding:14px 20px 12px;text-align:center;position:sticky;top:0;z-index:10;}
header h1{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:0.06em;}
header p{font-size:11px;color:var(--muted);margin-top:3px;}

/* 連線狀態 */
.conn-bar{display:flex;align-items:center;gap:6px;justify-content:center;padding:6px 16px;background:var(--navy2);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.conn-dot.ok{background:var(--green);}
.conn-dot.err{background:var(--red);}
.conn-dot.loading{background:var(--gold);animation:pulse 1s infinite;}

.clock-card{margin:14px 16px 12px;background:var(--navy2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px 18px;text-align:center;}
.time-display{font-family:'Share Tech Mono',monospace;font-size:3rem;color:var(--gold);letter-spacing:0.05em;line-height:1;}
.date-display{font-size:13px;color:var(--muted);margin-top:6px;}

.gps-bar{margin:0 16px 12px;padding:8px 14px;background:var(--navy2);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.gps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background 0.3s;}
.gps-dot.loading{background:var(--gold);animation:pulse 1s infinite;}
.gps-dot.ok{background:var(--green);}
.gps-dot.err{background:var(--red);}
.gps-retry{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;padding:2px 6px;}

.section-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;padding:0 20px 8px;}

.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px;}
.user-btn{background:var(--navy3);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:500;color:var(--gold);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.user-btn:active{transform:scale(0.96);}
.user-btn.selected{background:var(--navy4);border-color:var(--gold);}
.user-avatar{width:40px;height:40px;border-radius:50%;background:var(--navy4);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;border:1.5px solid var(--border);color:var(--gold);transition:all 0.15s;}
.user-btn.selected .user-avatar{background:var(--gold);color:var(--navy);border-color:var(--gold);}

.punch-row{margin:0 16px 18px;}
.btn-punch{width:100%;border:none;border-radius:var(--radius);padding:18px 0 16px;font-family:'Noto Sans TC',sans-serif;font-size:18px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform 0.12s,opacity 0.2s;-webkit-tap-highlight-color:transparent;}
.btn-punch:active{transform:scale(0.97);}
.btn-punch:disabled{opacity:0.25;cursor:not-allowed;transform:none;}
.btn-checkin{background:var(--navy3);color:var(--accent);border:1.5px solid var(--accent);}
.btn-icon{font-size:26px;line-height:1;}

/* 記錄 */
.records-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px 8px;}
.filter-bar{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;background:var(--navy2);border:1px solid var(--border);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.filter-chip.active{background:var(--navy4);border-color:var(--gold);color:var(--gold);}

.records-wrap{padding:0 16px;}
.no-records{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:14px;background:var(--navy2);border:1px solid var(--border);border-radius:var(--radius);}
.no-icon{font-size:28px;display:block;margin-bottom:8px;opacity:0.5;}

.user-group{margin-bottom:16px;}
.user-group-label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--gold);padding:6px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.avatar-sm{width:28px;height:28px;border-radius:50%;background:var(--navy3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold);border:1px solid var(--border);flex-shrink:0;}

.day-group{margin-bottom:10px;}
.day-label{font-size:20px;font-weight:500;color:var(--muted);padding:3px 2px 6px;border-bottom:0.5px solid var(--border);margin-bottom:6px;}

.record-card{background:var(--navy2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;overflow:hidden;}
.record-row{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.record-type{font-size:20px;font-weight:600;padding:4px 10px;border-radius:12px;min-width:52px;text-align:center;flex-shrink:0;background:#1A7A52;color:#fff;}
.record-time{font-family:'Share Tech Mono',monospace;font-size:28px;color:var(--text);flex:1;}
.record-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px;border-radius:6px;-webkit-tap-highlight-color:transparent;}

.map-row{display:flex;align-items:center;gap:6px;padding:7px 12px 10px;border-top:1px solid var(--border);overflow:hidden;}
.map-link{display:inline-flex;align-items:center;gap:3px;color:var(--accent);text-decoration:none;font-size:13px;font-family:'Share Tech Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.map-link:active{opacity:0.7;}
.acc-badge{font-size:12px;color:var(--muted);background:var(--navy3);border:1px solid var(--border);padding:2px 7px;border-radius:8px;flex-shrink:0;white-space:nowrap;}
.no-gps-note{font-size:13px;color:var(--muted);padding:7px 12px 10px;border-top:1px solid var(--border);}
.addr-row{font-size:13px;color:var(--green);padding:4px 12px 10px;letter-spacing:0.02em;}

.pair-dur{font-size:20px;color:var(--muted);padding:4px 12px 9px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dur{font-family:'Share Tech Mono',monospace;font-size:22px;color:var(--gold);}
.lunch-note{font-size:11px;color:var(--muted);}

.bottom-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 16px 0;}
.bottom-btn{padding:12px;border-radius:var(--radius-sm);background:var(--navy2);border:1px solid var(--border);font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}

.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(12px);background:var(--accent);color:var(--navy);padding:9px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:99;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:60;align-items:center;justify-content:center;}
.loading-overlay.open{display:flex;}
.loading-box{background:var(--navy2);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;text-align:center;min-width:200px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
.loading-box p{font-size:14px;color:var(--muted);}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:480px;}
.modal h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px;}
.modal p{font-size:13px;color:var(--muted);margin-bottom:18px;}
.modal-btns{display:flex;gap:10px;}
.modal-btn{flex:1;padding:13px;border-radius:var(--radius-sm);border:1px solid var(--border);font-family:'Noto Sans TC',sans-serif;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.modal-btn.danger{background:#C0390F;color:#fff;border-color:transparent;}
.modal-btn.cancel{background:var(--navy3);color:var(--muted);}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
</style>
</head>
<body>

<header>
  <h1>📋 團隊雲端打卡</h1>
  <p>即時同步・資料保存30天</p>
</header>

<!-- 雲端連線狀態 -->
<div class="conn-bar">
  <span class="conn-dot loading" id="connDot"></span>
  <span id="connText">連線中…</span>
</div>

<!-- 時鐘 -->
<div class="clock-card">
  <div class="time-display" id="clock">00:00:00</div>
  <div class="date-display" id="dateStr"></div>
</div>

<!-- GPS 狀態 -->
<div class="gps-bar">
  <span class="gps-dot loading" id="gpsDot"></span>
  <span class="gps-text" id="gpsText">正在取得位置…</span>
  <button class="gps-retry" id="gpsRetry" onclick="initGPS()" style="display:none">重試</button>
</div>

<!-- 選擇人員 -->
<div class="section-label">選擇打卡人員</div>
<div class="user-grid" id="userGrid"></div>

<!-- 打卡按鈕 -->
<div class="punch-row">
  <button class="btn-punch btn-checkin" id="btnCheckin" onclick="punch()" disabled>
    <span class="btn-icon">📌</span>打卡
  </button>
</div>

<!-- 記錄標題 -->
<div class="records-header">
  <span class="section-label" style="padding:0">所有人打卡記錄</span>
</div>
<div class="filter-bar" id="filterBar"></div>
<div class="records-wrap" id="recordsWrap">
  <div class="no-records"><span class="no-icon">⏳</span>載入中…</div>
</div>

<div class="bottom-btns">
  <button class="bottom-btn" onclick="exportCSV()">📁 匯出 CSV</button>
  <button class="bottom-btn" onclick="showClearModal()">🗑 清除記錄</button>
</div>

<!-- 載入遮罩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p id="loadingText">取得 GPS 位置中…</p>
  </div>
</div>

<!-- 確認清除 Modal -->
<div class="modal-overlay" id="clearModal" onclick="hideClearModal(event)">
  <div class="modal">
    <h2>確定清除記錄？</h2>
    <p>所有人員的打卡記錄將被永久刪除，無法復原。</p>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hideClearModal()">取消</button>
      <button class="modal-btn danger" onclick="confirmClear()">確定清除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════
   Firebase 初始化
══════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyAU3UmguouiMo-T88MvSqVHjmMsPpabHNM",
  authDomain: "team-punch.firebaseapp.com",
  projectId: "team-punch",
  storageBucket: "team-punch.firebasestorage.app",
  messagingSenderId: "846620721323",
  appId: "1:846620721323:web:cec555190c5455ec43f7ee",
  measurementId: "G-CZ3YHB35ED"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const COL = 'punch_records';

/* ══════════════════════════════════
   設定
══════════════════════════════════ */
const USERS   = ['呂憲政','陳莉莉','呂彥霈','呂彥霖'];
const AVATARS = {'呂憲政':'憲','陳莉莉':'莉','呂彥霈':'霈','呂彥霖':'霖'};
const KEEP_DAYS = 30;

let selectedUser = null;
let currentPos   = null;
let gpsReady     = false;
let filterUser   = '全部';
let allRecords   = []; // 快取用
let unsubscribe  = null;

/* ══════════════════════════════════
   時鐘
══════════════════════════════════ */
function pad(n){ return String(n).padStart(2,'0'); }
function fmtTime(d){ return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }
function fmtDate(d){
  const days=['日','一','二','三','四','五','六'];
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（週'+days[d.getDay()]+'）';
}
function fmtDateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function durText(ms){
  const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
  return h>0 ? h+'小時 '+pad(m)+'分' : m+'分鐘';
}
function tickClock(){
  const now=new Date();
  document.getElementById('clock').textContent=fmtTime(now);
  document.getElementById('dateStr').textContent=fmtDate(now);
}
tickClock(); setInterval(tickClock,1000);

/* ══════════════════════════════════
   GPS
══════════════════════════════════ */
function setGPSBar(state,msg){
  document.getElementById('gpsDot').className='gps-dot '+state;
  document.getElementById('gpsText').textContent=msg;
  document.getElementById('gpsRetry').style.display=(state==='err')?'inline':'none';
}
function initGPS(){
  if(!navigator.geolocation){ setGPSBar('err','此裝置不支援 GPS'); return; }
  setGPSBar('loading','正在取得位置…');
  gpsReady=false;
  navigator.geolocation.watchPosition(
    pos=>{
      currentPos={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:Math.round(pos.coords.accuracy)};
      gpsReady=true;
      setGPSBar('ok','📍 精確度 ±'+currentPos.acc+' 公尺');
    },
    err=>{
      gpsReady=false;
      const msgs={1:'請允許位置權限後重試',2:'無法取得位置訊號',3:'取得位置逾時'};
      setGPSBar('err', msgs[err.code]||'定位失敗');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:5000}
  );
}
initGPS();

/* ══════════════════════════════════
   雲端連線 & 即時監聽
══════════════════════════════════ */
function setConn(state,msg){
  document.getElementById('connDot').className='conn-dot '+state;
  document.getElementById('connText').textContent=msg;
}

function startListen(){
  const cutoff = new Date(Date.now() - KEEP_DAYS*24*3600*1000);
  if(unsubscribe) unsubscribe();
  unsubscribe = db.collection(COL)
    .where('ts','>=', cutoff)
    .orderBy('ts','desc')
    .onSnapshot(snap=>{
      setConn('ok','雲端已連線・即時同步');
      allRecords = snap.docs.map(d=>({id:d.id,...d.data(), ts: d.data().ts.toDate()}));
      renderRecords();
      updatePunchBtn();
    }, err=>{
      setConn('err','連線失敗，請重新整理');
      console.error(err);
    });
}
startListen();

/* ══════════════════════════════════
   使用者 UI
══════════════════════════════════ */
function renderUserGrid(){
  document.getElementById('userGrid').innerHTML = USERS.map(u=>`
    <button class="user-btn${selectedUser===u?' selected':''}" onclick="selectUser('${u}')">
      <div class="user-avatar">${AVATARS[u]}</div>${u}
    </button>`).join('');
}
function selectUser(name){
  selectedUser = (selectedUser===name)?null:name;
  renderUserGrid();
  updatePunchBtn();
}
function updatePunchBtn(){
  document.getElementById('btnCheckin').disabled = !selectedUser;
}

/* ══════════════════════════════════
   反向地理編碼（座標→地址）
══════════════════════════════════ */
async function reverseGeocode(lat, lng){
  try{
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=zh-TW`,
      {headers:{'Accept-Language':'zh-TW'}}
    );
    const data = await res.json();
    const a = data.address || {};
    // 優先顯示：里 > 路/街 > 區 > 市
    const parts = [];
    const city = a.city || a.county || a.state || '';
    const district = a.city_district || a.town || '';
    if(a.neighbourhood) parts.push(a.neighbourhood);
    else if(a.suburb)   parts.push(a.suburb);
    if(a.road)          parts.push(a.road);
    if(district)        parts.push(district);
    if(city)            parts.push(city);
    return parts.join(' ') || data.display_name?.split(',')[0] || '';
  }catch(e){ return ''; }
}

/* ══════════════════════════════════
   打卡
══════════════════════════════════ */
function punch(){
  if(!selectedUser){ showToast('⚠️ 請先選擇人員'); return; }
  const userRecs = allRecords.filter(r=>r.user===selectedUser);
  const lastRec  = userRecs[0]; // 已排序 desc
  const type     = (lastRec && lastRec.type==='in') ? 'out' : 'in';

  document.getElementById('loadingText').textContent = gpsReady?'取得 GPS 位置中…':'打卡記錄中…';
  document.getElementById('loadingOverlay').classList.add('open');

  const doSave = async posSnap=>{
    const now = new Date();
    let address = '';
    if(posSnap){
      document.getElementById('loadingText').textContent = '解析地址中…';
      address = await reverseGeocode(posSnap.lat, posSnap.lng);
    }
    db.collection(COL).add({
      user: selectedUser,
      type,
      ts: firebase.firestore.Timestamp.fromDate(now),
      time: fmtTime(now),
      date: fmtDateKey(now),
      gps: posSnap ? {lat:posSnap.lat, lng:posSnap.lng, acc:posSnap.acc} : null,
      address: address || null
    }).then(()=>{
      document.getElementById('loadingOverlay').classList.remove('open');
      const gpsNote = posSnap?` 📍±${posSnap.acc}m`:'（無位置）';
      showToast('✅ '+selectedUser+' 打卡 '+fmtTime(now)+gpsNote);
    }).catch(e=>{
      document.getElementById('loadingOverlay').classList.remove('open');
      showToast('❌ 儲存失敗：'+e.message);
    });
  };

  if(!navigator.geolocation||!gpsReady){ setTimeout(()=>doSave(currentPos),400); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      currentPos={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:Math.round(pos.coords.accuracy)};
      doSave(currentPos);
    },
    ()=>doSave(currentPos),
    {enableHighAccuracy:true,timeout:8000,maximumAge:3000}
  );
}

/* ══════════════════════════════════
   篩選
══════════════════════════════════ */
function renderFilterBar(){
  const bar=document.getElementById('filterBar');
  bar.innerHTML=['全部',...USERS].map(u=>`
    <button class="filter-chip${filterUser===u?' active':''}" onclick="setFilter('${u}')">${u}</button>
  `).join('');
}
function setFilter(u){ filterUser=u; renderFilterBar(); renderRecords(); }

/* ══════════════════════════════════
   渲染記錄
══════════════════════════════════ */
function renderRecords(){
  renderFilterBar();
  const wrap=document.getElementById('recordsWrap');
  const recs = filterUser==='全部' ? allRecords : allRecords.filter(r=>r.user===filterUser);
  if(!recs.length){
    wrap.innerHTML='<div class="no-records"><span class="no-icon">📋</span>尚無打卡記錄</div>'; return;
  }

  const byUser={};
  recs.forEach(r=>{ (byUser[r.user]=byUser[r.user]||[]).push(r); });

  let html='';
  USERS.filter(u=>byUser[u]).forEach(userName=>{
    const urecs=byUser[userName];
    html+=`<div class="user-group">
      <div class="user-group-label"><div class="avatar-sm">${AVATARS[userName]}</div>${userName}</div>`;

    const byDay={};
    urecs.forEach(r=>{ const dk=fmtDateKey(r.ts); (byDay[dk]=byDay[dk]||[]).push(r); });
    Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).forEach(day=>{
      const dr=byDay[day];
      const [y,mo,d]=day.split('-');
      html+=`<div class="day-group"><div class="day-label">${y}年${parseInt(mo)}月${parseInt(d)}日</div>`;
      let i=0;
      while(i<dr.length){
        const r=dr[i];
        if(r.type==='in'){
          const nxt=dr[i+1]&&dr[i+1].type==='out'?dr[i+1]:null;
          html+=cardHtml(r);
          if(nxt){
            html+=cardHtml(nxt);
            const totalMs=nxt.ts-r.ts;
            const actualMs=Math.max(0,totalMs-3600000);
            const ln=totalMs>=3600000?'（已扣午休1小時）':'';
            html+=`<div class="pair-dur">⏱ 實際工時 <span class="dur">${durText(actualMs)}</span><span class="lunch-note">${ln}</span></div>`;
            i+=2; continue;
          }
        } else { html+=cardHtml(r); }
        i++;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  wrap.innerHTML=html;
}

function cardHtml(r){
  const mapRow = r.gps
    ?`<div class="map-row">
        <a class="map-link" href="https://www.google.com/maps?q=${r.gps.lat},${r.gps.lng}" target="_blank" rel="noopener">
          📍 ${r.gps.lat.toFixed(5)}, ${r.gps.lng.toFixed(5)}
        </a>
        <span class="acc-badge">±${r.gps.acc}m</span>
      </div>
      ${r.address ? `<div class="addr-row">🏠 ${r.address}</div>` : ''}`
    :`<div class="no-gps-note">📵 未記錄位置</div>`;
  return`<div class="record-card">
    <div class="record-row">
      <span class="record-type">打卡</span>
      <span class="record-time">${r.time}</span>
      <button class="record-del" onclick="deleteRecord('${r.id}')" aria-label="刪除">✕</button>
    </div>${mapRow}
  </div>`;
}

function deleteRecord(id){
  db.collection(COL).doc(id).delete()
    .then(()=>showToast('已刪除一筆記錄'))
    .catch(()=>showToast('❌ 刪除失敗'));
}

/* ══════════════════════════════════
   清除
══════════════════════════════════ */
function showClearModal(){
  if(!allRecords.length){ showToast('目前沒有記錄'); return; }
  document.getElementById('clearModal').classList.add('open');
}
function hideClearModal(e){
  if(!e||e.target===document.getElementById('clearModal'))
    document.getElementById('clearModal').classList.remove('open');
}
async function confirmClear(){
  document.getElementById('clearModal').classList.remove('open');
  document.getElementById('loadingText').textContent='清除中…';
  document.getElementById('loadingOverlay').classList.add('open');
  const snap = await db.collection(COL).get();
  const batch = db.batch();
  snap.docs.forEach(d=>batch.delete(d.ref));
  await batch.commit();
  document.getElementById('loadingOverlay').classList.remove('open');
  showToast('已清除所有記錄');
}

/* ══════════════════════════════════
   匯出 CSV
══════════════════════════════════ */
function exportCSV(){
  if(!allRecords.length){ showToast('目前沒有記錄可匯出'); return; }
  let csv='\uFEFF人員,日期,類型,時間,緯度,經度,精確度(m),Google地圖連結\n';
  [...allRecords].reverse().forEach(r=>{
    const t=r.type==='in'?'上班':'下班';
    const lat=r.gps?r.gps.lat:'';
    const lng=r.gps?r.gps.lng:'';
    const acc=r.gps?r.gps.acc:'';
    const link=r.gps?`https://www.google.com/maps?q=${r.gps.lat},${r.gps.lng}`:'';
    csv+=`${r.user},${fmtDateKey(r.ts)},${t},${r.time},${lat},${lng},${acc},${link}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='團隊打卡_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ CSV 已匯出');
}

/* ══════════════════════════════════
   Toast
══════════════════════════════════ */
let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

/* 初始化 */
renderUserGrid();
renderFilterBar();
</script>
