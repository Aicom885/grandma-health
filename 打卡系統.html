<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="打卡系統">
<title>打卡系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#EEEEE8;--card:#FFFFFF;--surface:#F4F4EE;--border:#D8D6CE;
    --text:#1C1C1E;--muted:#8A8A8E;
    --in-bg:#1A7A52;--in:#FFFFFF;
    --out-bg:#C0390F;--out:#FFFFFF;
    --radius:16px;--radius-sm:10px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1C1C1E;--card:#2C2C2E;--surface:#3A3A3C;--border:#48484A;
      --text:#F2F2F7;--muted:#8A8A8E;
      --in-bg:#1A7A52;--in:#FFFFFF;
      --out-bg:#C0390F;--out:#FFFFFF;
    }
  }
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}

  header{background:var(--card);border-bottom:0.5px solid var(--border);padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  header h1{font-size:17px;font-weight:700;letter-spacing:0.03em;}

  .time-card{background:var(--card);margin:16px;border-radius:var(--radius);border:0.5px solid var(--border);padding:28px 20px 24px;text-align:center;}
  .time-display{font-family:'Share Tech Mono',monospace;font-size:3.4rem;font-weight:400;color:var(--text);letter-spacing:0.04em;line-height:1;}
  .date-display{font-size:13px;color:var(--muted);margin-top:8px;}
  .status-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;margin-top:14px;border:0.5px solid transparent;}
  .status-badge.idle{background:var(--surface);color:var(--muted);border-color:var(--border);}
  .status-badge.working{background:#1A7A52;color:#fff;}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .status-badge.working .dot{animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

  /* GPS 狀態列 */
  .gps-bar{
    margin:0 16px 12px;padding:9px 14px;
    background:var(--card);border:0.5px solid var(--border);
    border-radius:var(--radius-sm);
    display:flex;align-items:center;gap:8px;
    font-size:12px;color:var(--muted);
  }
  .gps-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.3s;}
  .gps-dot.ok{background:#1A7A52;}
  .gps-dot.err{background:#C0390F;}
  .gps-dot.loading{background:#E6A817;animation:pulse 1s infinite;}
  .gps-text{flex:1;}
  .gps-retry{font-size:11px;color:#1A7A52;background:none;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;padding:2px 6px;}

  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 16px 16px;}
  .btn-clock{border:none;border-radius:var(--radius);padding:18px 0 16px;font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:transform 0.12s,opacity 0.2s;-webkit-tap-highlight-color:transparent;}
  .btn-clock:active{transform:scale(0.96);}
  .btn-clock:disabled{opacity:0.3;cursor:not-allowed;transform:none;}
  .btn-in{background:var(--in-bg);color:var(--in);}
  .btn-out{background:var(--out-bg);color:var(--out);}
  .btn-icon{font-size:26px;line-height:1;}

  .section-header{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 10px;}
  .section-title{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
  .export-btn{font-size:12px;color:var(--muted);background:var(--card);border:0.5px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent;}

  .records-wrap{padding:0 16px;}
  .no-records{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:14px;background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);}
  .no-icon{font-size:32px;display:block;margin-bottom:10px;opacity:0.5;}
  .day-group{margin-bottom:14px;}
  .day-label{font-size:22px;font-weight:500;color:var(--muted);padding:4px 2px 7px;border-bottom:0.5px solid var(--border);margin-bottom:7px;letter-spacing:0.04em;}

  .record-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;}
  .record-row{display:flex;align-items:center;gap:10px;padding:10px 12px;}
  .record-type{font-size:22px;font-weight:500;padding:3px 9px;border-radius:12px;min-width:44px;text-align:center;flex-shrink:0;}
  .record-type.in{background:#1A7A52;color:#fff;}
  .record-type.out{background:#C0390F;color:#fff;}
  .record-time{font-family:'Share Tech Mono',monospace;font-size:30px;color:var(--text);flex:1;}
  .record-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px;border-radius:6px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent;}

  /* 地圖連結列 */
  .map-row{
    display:flex;align-items:center;gap:6px;
    padding:7px 12px 10px;
    border-top:0.5px solid var(--border);
    overflow:hidden;
  }
  .map-link{
    display:inline-flex;align-items:center;gap:3px;
    color:#1A6FB5;text-decoration:none;
    font-size:13px;font-family:'Share Tech Mono',monospace;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    flex:1;min-width:0;
  }
  .map-link:active{opacity:0.7;}
  .acc-badge{
    font-size:12px;color:var(--muted);
    background:var(--surface);border:0.5px solid var(--border);
    padding:2px 7px;border-radius:8px;flex-shrink:0;
    white-space:nowrap;
  }
  .no-gps-note{font-size:22px;color:var(--muted);padding:7px 12px 10px;border-top:0.5px solid var(--border);}

  .pair-dur{font-size:22px;color:var(--muted);padding:3px 12px 8px;display:flex;align-items:center;gap:5px;}
  .dur{font-family:'Share Tech Mono',monospace;font-size:24px;color:var(--text);}

  .clear-btn{display:block;width:calc(100% - 32px);margin:8px 16px 28px;padding:13px;border:0.5px solid var(--border);background:var(--card);border-radius:var(--radius-sm);font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}

  .toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--bg);padding:9px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:99;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* 載入遮罩（打卡中取得位置） */
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:60;align-items:center;justify-content:center;}
  .loading-overlay.open{display:flex;}
  .loading-box{background:var(--card);border-radius:var(--radius);padding:28px 32px;text-align:center;min-width:200px;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:#1A7A52;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-box p{font-size:14px;color:var(--muted);}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:480px;}
  .modal h2{font-size:15px;font-weight:600;margin-bottom:6px;}
  .modal p{font-size:13px;color:var(--muted);margin-bottom:18px;}
  .modal-btns{display:flex;gap:10px;}
  .modal-btn{flex:1;padding:13px;border-radius:var(--radius-sm);border:0.5px solid var(--border);font-family:'Noto Sans TC',sans-serif;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .modal-btn.danger{background:#C0390F;color:#fff;border-color:transparent;}
  .modal-btn.cancel{background:var(--surface);color:var(--muted);}
</style>
</head>
<body>

<header>
  <h1>⏱ 打卡系統</h1>
  <div class="status-badge idle" id="statusBadge">
    <span class="dot"></span><span id="statusText">尚未打卡</span>
  </div>
</header>

<div class="time-card">
  <div class="time-display" id="clock">00:00:00</div>
  <div class="date-display" id="dateStr"></div>
</div>

<!-- GPS 狀態列 -->
<div class="gps-bar">
  <span class="gps-dot loading" id="gpsDot"></span>
  <span class="gps-text" id="gpsText">正在取得位置…</span>
  <button class="gps-retry" id="gpsRetry" onclick="initGPS()" style="display:none">重試</button>
</div>

<div class="btn-row">
  <button class="btn-clock btn-in" id="btnIn" onclick="punch('in')">
    <span class="btn-icon">🟢</span>上班打卡
  </button>
  <button class="btn-clock btn-out" id="btnOut" onclick="punch('out')">
    <span class="btn-icon">🔴</span>下班打卡
  </button>
</div>

<div class="section-header">
  <span class="section-title">打卡記錄</span>
  <button class="export-btn" onclick="exportCSV()">匯出 CSV</button>
</div>
<div class="records-wrap" id="recordsWrap"></div>
<button class="clear-btn" onclick="showClearModal()">🗑 清除所有記錄</button>

<!-- 取得定位中遮罩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p id="loadingText">取得 GPS 位置中…</p>
  </div>
</div>

<div class="modal-overlay" id="clearModal" onclick="hideClearModal(event)">
  <div class="modal">
    <h2>確定清除？</h2>
    <p>所有打卡記錄將被永久刪除，無法復原。</p>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hideClearModal()">取消</button>
      <button class="modal-btn danger" onclick="clearAll()">確定清除</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='punch_records_v2';
let records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
let currentPos=null; // {lat, lng, accuracy}
let gpsReady=false;

/* ── 時鐘 ── */
function pad(n){return String(n).padStart(2,'0');}
function fmtTime(d){return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());}
function fmtDate(d){
  const days=['日','一','二','三','四','五','六'];
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（週'+days[d.getDay()]+'）';
}
function fmtDateKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function durText(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h>0?h+'小時 '+pad(m)+'分':m+'分鐘';}

function tickClock(){
  const now=new Date();
  document.getElementById('clock').textContent=fmtTime(now);
  document.getElementById('dateStr').textContent=fmtDate(now);
}
tickClock();setInterval(tickClock,1000);

/* ── GPS ── */
function setGPSBar(state, msg){
  const dot=document.getElementById('gpsDot');
  const txt=document.getElementById('gpsText');
  const btn=document.getElementById('gpsRetry');
  dot.className='gps-dot '+state;
  txt.textContent=msg;
  btn.style.display=(state==='err')?'inline':'none';
}

function initGPS(){
  if(!navigator.geolocation){
    setGPSBar('err','此裝置不支援 GPS 定位');return;
  }
  setGPSBar('loading','正在取得位置…');
  gpsReady=false;
  navigator.geolocation.watchPosition(
    pos=>{
      currentPos={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:Math.round(pos.coords.accuracy)};
      gpsReady=true;
      setGPSBar('ok',`📍 精確度 ±${currentPos.acc} 公尺`);
    },
    err=>{
      gpsReady=false;
      const msgs={1:'請允許位置權限後重試',2:'無法取得位置訊號',3:'取得位置逾時'};
      setGPSBar('err',msgs[err.code]||'定位失敗');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:5000}
  );
}
initGPS();

/* ── 打卡 ── */
function getStatus(){
  if(!records.length)return'idle';
  return records[records.length-1].type==='in'?'working':'idle';
}
function updateStatus(){
  const s=getStatus();
  const badge=document.getElementById('statusBadge');
  const txt=document.getElementById('statusText');
  document.getElementById('btnIn').disabled=(s==='working');
  document.getElementById('btnOut').disabled=(s!=='working');
  if(s==='working'){badge.className='status-badge working';txt.textContent='上班中';}
  else{badge.className='status-badge idle';txt.textContent='尚未打卡';}
}
function saveRecords(){localStorage.setItem(STORAGE_KEY,JSON.stringify(records));}

function punch(type){
  if(type==='in'&&getStatus()==='working'){showToast('⚠️ 已在上班中');return;}
  if(type==='out'&&getStatus()!=='working'){showToast('⚠️ 尚未上班打卡');return;}

  const label=document.getElementById('loadingText');
  label.textContent=gpsReady?'取得 GPS 位置中…':'打卡記錄中（無 GPS）…';
  document.getElementById('loadingOverlay').classList.add('open');

  const doRecord=(posSnap)=>{
    const now=new Date();
    const rec={
      type,
      ts:now.getTime(),
      time:fmtTime(now),
      date:fmtDateKey(now),
      gps:posSnap?{lat:posSnap.lat,lng:posSnap.lng,acc:posSnap.acc}:null
    };
    records.push(rec);
    saveRecords();updateStatus();renderRecords();
    document.getElementById('loadingOverlay').classList.remove('open');
    const typeLabel=type==='in'?'上班':'下班';
    const gpsNote=posSnap?` 📍±${posSnap.acc}m`:'（無位置）';
    showToast(`✅ ${typeLabel}打卡 ${fmtTime(now)}${gpsNote}`);
  };

  if(!navigator.geolocation||!gpsReady){
    // 直接用上次的位置或無位置
    setTimeout(()=>doRecord(currentPos),400);
    return;
  }

  // 即時取一次最新座標
  navigator.geolocation.getCurrentPosition(
    pos=>{
      currentPos={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:Math.round(pos.coords.accuracy)};
      doRecord(currentPos);
    },
    ()=>doRecord(currentPos), // 失敗就用上一次快取
    {enableHighAccuracy:true,timeout:8000,maximumAge:3000}
  );
}

function deleteRecord(idx){
  records.splice(idx,1);
  saveRecords();updateStatus();renderRecords();showToast('已刪除一筆記錄');
}
function showClearModal(){
  if(!records.length){showToast('目前沒有記錄');return;}
  document.getElementById('clearModal').classList.add('open');
}
function hideClearModal(e){
  if(!e||e.target===document.getElementById('clearModal'))
    document.getElementById('clearModal').classList.remove('open');
}
function clearAll(){
  records=[];saveRecords();updateStatus();renderRecords();
  document.getElementById('clearModal').classList.remove('open');
  showToast('已清除所有記錄');
}

/* ── 渲染記錄 ── */
function renderRecords(){
  const wrap=document.getElementById('recordsWrap');
  if(!records.length){
    wrap.innerHTML='<div class="no-records"><span class="no-icon">📋</span>尚無打卡記錄</div>';return;
  }
  const byDay={};
  records.forEach((r,i)=>{(byDay[r.date]=byDay[r.date]||[]).push({...r,idx:i});});
  const days=Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
  let html='';
  days.forEach(day=>{
    const recs=byDay[day];
    const [y,mo,d]=day.split('-');
    html+=`<div class="day-group"><div class="day-label">${y}年${parseInt(mo)}月${parseInt(d)}日</div>`;
    let i=0;
    while(i<recs.length){
      const r=recs[i];
      if(r.type==='in'){
        const nxt=recs[i+1]&&recs[i+1].type==='out'?recs[i+1]:null;
        html+=cardHtml(r,'in','上班');
        if(nxt){
          html+=cardHtml(nxt,'out','下班');
          const totalMs=nxt.ts-r.ts;
          const actualMs=Math.max(0,totalMs-3600000);
          const lunchNote=totalMs>=3600000?'（已扣午休1小時）':'';
          html+=`<div class="pair-dur">⏱ 實際工時 <span class="dur">${durText(actualMs)}</span><span style="font-size:11px;color:var(--muted)">${lunchNote}</span></div>`;
          i+=2;continue;
        }
      }else{
        html+=cardHtml(r,'out','下班');
      }
      i++;
    }
    html+=`</div>`;
  });
  wrap.innerHTML=html;
}

function cardHtml(r,cls,label){
  const mapRow=r.gps
    ?`<div class="map-row">
        <a class="map-link" href="https://www.google.com/maps?q=${r.gps.lat},${r.gps.lng}" target="_blank" rel="noopener">
          📍 ${r.gps.lat.toFixed(5)}, ${r.gps.lng.toFixed(5)}
        </a>
        <span class="acc-badge">±${r.gps.acc}m</span>
      </div>`
    :`<div class="no-gps-note">📵 未記錄位置</div>`;
  return`<div class="record-card">
    <div class="record-row">
      <span class="record-type ${cls}">${label}</span>
      <span class="record-time">${r.time}</span>
      <button class="record-del" onclick="deleteRecord(${r.idx})" aria-label="刪除">✕</button>
    </div>
    ${mapRow}
  </div>`;
}

/* ── 匯出 CSV ── */
function exportCSV(){
  if(!records.length){showToast('目前沒有記錄可匯出');return;}
  let csv='\uFEFF日期,類型,時間,緯度,經度,精確度(m),Google地圖連結\n';
  records.forEach(r=>{
    const t=r.type==='in'?'上班':'下班';
    const lat=r.gps?r.gps.lat:'';
    const lng=r.gps?r.gps.lng:'';
    const acc=r.gps?r.gps.acc:'';
    const link=r.gps?`https://www.google.com/maps?q=${r.gps.lat},${r.gps.lng}`:'';
    csv+=`${r.date},${t},${r.time},${lat},${lng},${acc},${link}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='打卡記錄_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ CSV 已匯出');
}

let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

updateStatus();renderRecords();
</script>
</body>
</html>
