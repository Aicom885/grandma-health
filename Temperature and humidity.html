<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>溫濕度環境儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:40px}

  /* Header */
  .header{background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);padding:18px 20px 0;border-bottom:1px solid #1e293b}
  .header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .header-icon{font-size:26px}
  .header-title{font-size:18px;font-weight:700;color:#f1f5f9}
  .header-sub{font-size:11px;color:#64748b;margin-top:2px}
  .tabs{display:flex;gap:2px}
  .tab{padding:8px 15px;font-size:12px;border:none;cursor:pointer;border-radius:8px 8px 0 0;background:transparent;color:#64748b;border-bottom:2px solid transparent;transition:all .2s}
  .tab.active{background:#1e293b;color:#38bdf8;border-bottom-color:#38bdf8}

  /* Content */
  .content{padding:16px}
  .panel{display:none}
  .panel.active{display:block}

  /* KPI Grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
  .kpi{background:#1e293b;border-radius:10px;padding:12px 14px;border:1px solid #334155}
  .kpi-label{font-size:10px;color:#64748b;margin-bottom:4px}
  .kpi-val{font-size:20px;font-weight:700}
  .kpi-sub{font-size:10px;color:#94a3b8;margin-top:2px}

  /* Cards */
  .card{background:#1e293b;border-radius:12px;padding:14px 16px;border:1px solid #334155;margin-bottom:14px}
  .card-title{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:10px}
  .chart-wrap{position:relative}

  /* Summary table */
  .summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #0f172a;font-size:12px}
  .summary-row:last-child{border-bottom:none}
  .s-label{color:#94a3b8}
  .s-right{display:flex;gap:12px;align-items:center}
  .s-val{color:#e2e8f0;font-weight:600}

  /* Daily table */
  .tbl{width:100%;border-collapse:collapse;font-size:11px}
  .tbl th{color:#64748b;padding:5px 6px;border-bottom:1px solid #334155;text-align:center;font-weight:500}
  .tbl td{padding:5px 6px;text-align:center}
  .tbl tr:nth-child(even) td{background:#0f172a}

  /* VPD bar */
  .vpd-item{margin-bottom:10px}
  .vpd-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
  .vpd-track{background:#0f172a;border-radius:4px;height:7px}
  .vpd-fill{height:100%;border-radius:4px;transition:width .5s}

  /* Legend pills */
  .legend-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:10px}
  .pill{display:flex;align-items:center;gap:4px;color:#94a3b8}
  .pill-dot{width:8px;height:8px;border-radius:50%}

  /* Scatter */
  canvas{max-width:100%}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-icon">🌡️</span>
    <div>
      <div class="header-title">溫濕度環境儀表板</div>
      <div class="header-sub">溫濕度計Pro BC · 2026-06-08 ～ 2026-06-19 · <span id="totalCount"></span> 筆記錄</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)">概覽</button>
    <button class="tab" onclick="switchTab(1)">溫濕度趨勢</button>
    <button class="tab" onclick="switchTab(2)">每日統計</button>
    <button class="tab" onclick="switchTab(3)">VPD 分析</button>
  </div>
</div>

<div class="content">
  <!-- Panel 0: 概覽 -->
  <div class="panel active" id="panel0">
    <div class="kpi-grid" id="kpiGrid"></div>
    <div class="card">
      <div class="card-title">溫度 / 濕度 快覽（每3小時）</div>
      <div class="chart-wrap"><canvas id="overviewChart" height="160"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">📋 環境評估摘要</div>
      <div id="summaryRows"></div>
    </div>
  </div>

  <!-- Panel 1: 趨勢 -->
  <div class="panel" id="panel1">
    <div class="card">
      <div class="card-title">溫度趨勢 (°C) — 29°C 警戒線</div>
      <div class="chart-wrap"><canvas id="tempChart" height="170"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">相對濕度趨勢 (%) — 85% / 60% 參考線</div>
      <div class="chart-wrap"><canvas id="rhChart" height="170"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">絕對濕度 & 露點對比</div>
      <div class="chart-wrap"><canvas id="ahChart" height="160"></canvas></div>
    </div>
  </div>

  <!-- Panel 2: 每日統計 -->
  <div class="panel" id="panel2">
    <div class="card">
      <div class="card-title">每日溫度（最高 / 平均 / 最低）</div>
      <div class="chart-wrap"><canvas id="dailyTempChart" height="180"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">每日濕度（最高 / 平均 / 最低）</div>
      <div class="chart-wrap"><canvas id="dailyRhChart" height="170"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">每日數據表</div>
      <div style="overflow-x:auto"><table class="tbl" id="dailyTable"></table></div>
    </div>
  </div>

  <!-- Panel 3: VPD -->
  <div class="panel" id="panel3">
    <div class="card">
      <div class="card-title">VPD 趨勢 (kPa)</div>
      <div class="legend-pills">
        <div class="pill"><div class="pill-dot" style="background:#22d3ee"></div>&lt;0.5 過濕</div>
        <div class="pill"><div class="pill-dot" style="background:#4ade80"></div>0.5–1.0 舒適</div>
        <div class="pill"><div class="pill-dot" style="background:#facc15"></div>1.0–1.5 偏乾</div>
        <div class="pill"><div class="pill-dot" style="background:#f87171"></div>&gt;1.5 乾燥</div>
      </div>
      <div class="chart-wrap"><canvas id="vpdChart" height="170"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">溫度 vs VPD 散佈圖</div>
      <div class="chart-wrap"><canvas id="scatterChart" height="200"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">VPD 區間分布統計</div>
      <div id="vpdBars"></div>
    </div>
  </div>
</div>

function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
}
</script>
